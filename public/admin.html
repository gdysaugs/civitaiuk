<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | civitai.uk</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>civitai.uk admin</h1>
        <p class="subtitle">Report moderation console</p>
      </div>
      <div class="topbar-actions">
        <a class="btn" href="/">Back to Board</a>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <form id="adminForm" class="form card">
          <h3>Admin Auth</h3>
          <label>Admin Token <input id="adminToken" type="password" autocomplete="off" /></label>
          <label>Status
            <select id="statusFilter">
              <option value="open">open</option>
              <option value="all">all</option>
              <option value="resolved">resolved</option>
              <option value="rejected">rejected</option>
            </select>
          </label>
          <button id="loadReportsBtn" class="btn primary" type="submit">Load Reports</button>
        </form>

        <div id="adminMessage" class="card empty">Enter admin token and load reports.</div>
        <div id="reportList" class="thread-list"></div>
      </section>
    </main>

    <script type="module" src="/admin.js"></script>
  </body>
</html>
