<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>新規スレッド | AIちゃんねる</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.webp" type="image/webp" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand brand-link" href="/">
        <h1>AIちゃんねる</h1>
        <p>AI画像専用の掲示板サイト</p>
      </a>
      <div class="header-actions">
        <a href="/" class="btn ghost">一覧へ戻る</a>
      </div>
    </header>

    <main class="app-layout single">
      <section class="detail-column">
        <form id="threadForm" class="composer card">
          <input
            name="authorName"
            type="text"
            maxlength="40"
            placeholder="名前（空欄なら名無しちゃん）"
            autocomplete="nickname"
          />
          <input name="title" type="text" maxlength="50" placeholder="スレタイ（3〜50文字）" />
          <textarea name="body" maxlength="500" placeholder="内容"></textarea>

          <div class="file-picker">
            <input id="threadMediaFile" class="file-input" name="mediaFile" type="file" accept="image/*,video/*" />
            <label for="threadMediaFile" class="file-trigger">
              <span class="file-trigger-title">画像・動画を選択</span>
              <span class="file-trigger-sub">画像はすぐプレビューされます</span>
            </label>
            <div class="file-meta" data-file-meta="thread">ファイル未選択</div>
            <div class="file-preview hidden" data-file-preview="thread"></div>
          </div>

          <input name="mediaKey" type="hidden" />
          <input name="mediaUrl" type="hidden" />
          <input name="mediaMime" type="hidden" />
          <div class="turnstile-slot" data-turnstile="thread"></div>

          <div class="composer-actions">
            <button class="btn primary" type="submit">投稿してスレッド作成</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="/new.js"></script>
  </body>
</html>
