<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI動画のレシピ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="icon" href="/favicon.webp" type="image/webp" />
    <link rel="shortcut icon" href="/favicon.webp" type="image/webp" />
    <link rel="apple-touch-icon" href="/favicon.webp" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="site-header app-header">
      <a class="brand brand-link" href="/">
        <h1>AI動画のレシピ</h1>
        <p>AI動画の作り方をまとめるブログ</p>
      </a>
    </header>

    <main class="container">
      <section id="postList" class="post-grid"></section>
      <nav id="pager" class="pager hidden" aria-label="Pagination"></nav>
    </main>

    <template id="postCardTemplate">
      <article class="card post-card">
        <button class="post-card-button" type="button">
          <div class="post-card-media"></div>
          <div class="post-card-content">
            <h3 class="post-card-title"></h3>
            <p class="post-card-meta"></p>
            <p class="post-card-excerpt"></p>
          </div>
        </button>
      </article>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
