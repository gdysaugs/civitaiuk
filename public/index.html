<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIちゃんねる</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="/favicon.webp" type="image/webp" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand brand-link" href="/">
        <h1>AIちゃんねる</h1>
        <p>AI画像専用の掲示板サイト</p>
      </a>
      <div class="header-actions">
        <a href="/new" class="btn primary">スレッド作成</a>
      </div>
    </header>

    <main class="list-layout">
      <section class="feed-column">
        <section class="feed-head card">
          <h2>スレッド一覧</h2>
          <p class="muted">更新順</p>
        </section>
        <div id="threads" class="feed-list"></div>
        <nav id="threadPager" class="pagination-nav list-pagination hidden" aria-label="スレッドページ移動"></nav>
      </section>
    </main>

    <footer class="page-footer">
      <div class="page-footer-actions">
        <a href="/report" class="btn ghost">通報</a>
        <a href="/terms" class="btn ghost">利用規約</a>
      </div>
    </footer>

    <template id="threadItemTemplate">
      <button class="feed-item" type="button">
        <div class="feed-item-row">
          <div class="thread-thumb"></div>
          <div class="feed-main">
            <p class="feed-title"></p>
            <div class="feed-meta">
              <span class="updated"></span>
            </div>
          </div>
        </div>
      </button>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
